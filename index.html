<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo</title>

<style>
body { margin: 0; overflow: hidden; }

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}

#healthBar {
  width: 200px;
  height: 20px;
  background: red;
}

#health {
  width: 100%;
  height: 100%;
  background: green;
}

#quizBox {
  margin-top: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}
</style>
</head>

<body>

<div id="ui">
  <div id="healthBar">
    <div id="health"></div>
  </div>

  <p id="score">Pontuação: 0</p>

  <div id="quizBox" style="display:none;">
    <p id="question"></p>
    <input type="text" id="answer" placeholder="Digite sua resposta"/>
    <button onclick="submitAnswer()">Responder</button>
  </div>
</div>

<script type="module" src="./main.js"></script>

</body>
</html>
